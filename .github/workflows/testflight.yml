name: TestFlight

# Archive → sign → upload to TestFlight entirely on a GitHub-hosted Mac.
# No local Mac needed. Trigger it from the Actions tab → "TestFlight" → Run workflow.
#
# One-time setup is all browser-based — see docs/TESTFLIGHT.md. You must add these
# repository secrets (Settings → Secrets and variables → Actions → New secret):
#   APPLE_TEAM_ID  – your 10-character Apple Developer Team ID
#   APP_BUNDLE_ID  – the bundle id of your App Store Connect app record
#                    (e.g. com.yourname.RollnWrite)
#   ASC_KEY_ID     – App Store Connect API key ID
#   ASC_ISSUER_ID  – App Store Connect API key Issuer ID
#   ASC_KEY_P8     – the full text contents of the AuthKey_XXXXXX.p8 file

on:
  workflow_dispatch:

jobs:
  testflight:
    name: Upload to TestFlight
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          printf '%s' "${{ secrets.ASC_KEY_P8 }}" > "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project RollnWrite.xcodeproj \
            -scheme RollnWrite \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/RollnWrite.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID '${{ secrets.ASC_KEY_ID }}' \
            -authenticationKeyIssuerID '${{ secrets.ASC_ISSUER_ID }}' \
            DEVELOPMENT_TEAM='${{ secrets.APPLE_TEAM_ID }}' \
            PRODUCT_BUNDLE_IDENTIFIER='${{ secrets.APP_BUNDLE_ID }}' \
            MARKETING_VERSION=1.0 \
            CURRENT_PROJECT_VERSION='${{ github.run_number }}' \
            CODE_SIGN_STYLE=Automatic

      - name: Export & upload to TestFlight
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>generateAppStoreInformation</key><false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/RollnWrite.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID '${{ secrets.ASC_KEY_ID }}' \
            -authenticationKeyIssuerID '${{ secrets.ASC_ISSUER_ID }}'

      - name: Clean up secrets
        if: always()
        run: rm -rf "$HOME/private_keys"
