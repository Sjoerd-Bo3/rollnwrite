name: 2. TestFlight

# Build → cloud-sign → upload to TestFlight entirely on a GitHub-hosted Mac,
# driven by fastlane (fastlane/Fastfile, lane `beta`). No local Mac needed.
# Trigger it from the Actions tab → "TestFlight" → Run workflow.
#
# Run the "Validate Secrets" workflow first to confirm your secrets are good.
# One-time setup (all browser-based) is in docs/TESTFLIGHT.md. Required
# repository secrets (Settings → Secrets and variables → Actions):
#   APPLE_TEAM_ID  – your 10-character Apple Developer Team ID
#   APP_BUNDLE_ID  – the bundle id of your App Store Connect app record
#   ASC_KEY_ID     – App Store Connect API key ID
#   ASC_ISSUER_ID  – App Store Connect API key Issuer ID
#   ASC_KEY_P8     – the full text contents of the AuthKey_XXXXXX.p8 file

# Minimal trigger set to conserve Actions minutes (macOS runners cost 10×):
# this is the ONLY auto-running workflow, and it builds ONLY from `main`.
# Push to main → one TestFlight build. Run it by hand any time from the Actions
# tab. No per-feature-branch builds, no scheduled builds.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"

# A newer push supersedes an in-flight upload, so cancel the older run.
concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testflight:
    name: Upload to TestFlight
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Configure match git auth (GH_PAT for the Match-Secrets repo)
        # Basic-auth the certs-repo clone as "<owner>:<PAT>", exactly like the
        # Trio/Loop fastlane. A PAT must be paired with the real account
        # username; the "x-access-token" username is only for GitHub App
        # installation tokens, and pairing it with a PAT makes GitHub return
        # "Repository not found" (404) on the private Match-Secrets repo.
        run: |
          AUTH=$(printf '%s' "${{ github.repository_owner }}:${{ secrets.GH_PAT }}" | base64 | tr -d '\n')
          echo "::add-mask::$AUTH"
          echo "MATCH_GIT_BASIC_AUTHORIZATION=$AUTH" >> "$GITHUB_ENV"

      - name: Diagnose Match-Secrets access (safe — prints no secret values)
        # match keeps failing with "Repository not found" (a 404 GitHub returns
        # for a private repo the token can't see). This probe isolates the cause
        # WITHOUT leaking the token: it prints only the token's length+kind, the
        # account it authenticates as, and the HTTP status for the certs repo.
        #   /user 401          → GH_PAT is invalid/expired/mis-pasted
        #   repo 404 (200 user)→ token is valid but lacks access to Match-Secrets
        #                        (fine-grained: repo not selected / Contents perm
        #                        missing) OR the owner/name is wrong
        #   repo 200           → access is fine; the failure is elsewhere
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set +e
          echo "GH_PAT length: ${#GH_PAT}"
          case "$GH_PAT" in
            ghp_*)         echo "GH_PAT kind: classic (ghp_)";;
            github_pat_*)  echo "GH_PAT kind: fine-grained (github_pat_)";;
            gho_*|ghs_*)   echo "GH_PAT kind: oauth/app token";;
            "")            echo "GH_PAT kind: EMPTY — secret not reaching the runner";;
            *)             echo "GH_PAT kind: unknown prefix";;
          esac
          echo "Authenticates as:"
          curl -s -H "Authorization: Bearer $GH_PAT" https://api.github.com/user \
            -w '  http=%{http_code}\n' | grep -E '"login"|http='
          echo "Access to Sjoerd-Bo3/Match-Secrets:"
          curl -s -o /dev/null -w '  http=%{http_code}\n' \
            -H "Authorization: Bearer $GH_PAT" \
            https://api.github.com/repos/Sjoerd-Bo3/Match-Secrets

      - name: Build & upload to TestFlight
        run: bundle exec fastlane ios beta
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          # match: reuse the existing encrypted certs repo (shared with Trio).
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: https://github.com/Sjoerd-Bo3/Match-Secrets.git
          # NOTE: do NOT pass MATCH_GIT_BRANCH here. fastlane's match action
          # auto-reads it from the environment, and an unset secret arrives as
          # an empty string — which overrides match's default branch ("master")
          # with "", causing `fatal: '' is not a valid branch name`. Leaving it
          # unset lets match use the certs repo's default branch.

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipa-and-logs
          path: |
            *.ipa
            ~/Library/Logs/gym/*.log
          if-no-files-found: ignore
