name: 4. Bump Version

# Set the marketing (user-facing) version for the next TestFlight build, e.g.
# 1.0 → 1.1. Run it from the Actions tab → "4. Bump Version" → Run workflow,
# type the new version, and it commits the change. The *build number* still
# auto-increments on every TestFlight upload, so you only touch this when you
# want the visible version (CFBundleShortVersionString) to change.

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "New marketing version (e.g. 1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump:
    name: Bump marketing version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version format
        run: |
          if ! printf '%s' "${{ inputs.marketing_version }}" | grep -Eq '^[0-9]+(\.[0-9]+){1,2}$'; then
            echo "::error::Version must look like 1.0, 1.1, or 1.2.3"
            exit 1
          fi

      - name: Update MARKETING_VERSION in project
        run: |
          sed -i -E "s/MARKETING_VERSION = [^;]+;/MARKETING_VERSION = ${{ inputs.marketing_version }};/g" \
            RollnWrite.xcodeproj/project.pbxproj
          echo "Updated to:"
          grep -n "MARKETING_VERSION" RollnWrite.xcodeproj/project.pbxproj

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No change — version already ${{ inputs.marketing_version }}."
            exit 0
          fi
          git add RollnWrite.xcodeproj/project.pbxproj
          git commit -m "Bump marketing version to ${{ inputs.marketing_version }}"
          git push
