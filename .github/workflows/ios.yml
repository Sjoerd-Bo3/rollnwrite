name: 3. iOS Build

# Compile-only check on a macOS runner (no signing). MANUAL ONLY — to conserve
# Actions minutes it no longer runs on every push/PR; trigger it from the
# Actions tab when you want a standalone compile verification. (Pushing to main
# already compiles via the TestFlight archive.)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Xcode version
        run: xcodebuild -version

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project RollnWrite.xcodeproj \
            -scheme RollnWrite \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
