name: 1. Validate Secrets

# Fast preflight (~1 min) that proves your App Store Connect secrets are valid
# BEFORE you spend ~15 minutes on a real TestFlight build. Inspired by Trio's
# "Validate Secrets" step. Run this from the Actions tab whenever you add or
# change a secret. It builds nothing and uploads nothing.

on:
  workflow_dispatch:

jobs:
  validate:
    name: Check App Store Connect secrets
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Validate secrets
        run: bundle exec fastlane ios validate_secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
