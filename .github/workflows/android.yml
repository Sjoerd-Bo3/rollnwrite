name: 7. Android Build

# Compile + test check on an ubuntu runner. Runs PER-PR (unlike iOS): GitHub
# Actions bills Linux runners at 1×, vs. 10× for macOS — that's why iOS has
# no per-PR CI (see testflight.yml) but Android does. Path-filtered so it
# only fires when the Android module or its shared fixtures actually change.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "android/**"
      - "spec/**"
      - ".github/workflows/android.yml"
  push:
    branches: [main]
    paths:
      - "android/**"
      - "spec/**"
      - ".github/workflows/android.yml"

# A newer push/PR update supersedes an in-flight run, so cancel the older one.
concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Gradle)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle (caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        working-directory: android
        run: ./gradlew build --stacktrace
